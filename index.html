<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#6366f1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>CET-4 听力翻译刷题器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--primary-light:#eef2ff;--primary-dark:#4f46e5;
  --success:#10b981;--success-light:#ecfdf5;--danger:#ef4444;--danger-light:#fef2f2;
  --accent:#0ea5e9;--accent-light:#f0f9ff;
  --bg:#f1f5f9;--card:#fff;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--border-light:#f1f5f9;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --radius:12px;--radius-lg:16px;--radius-xl:20px;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans SC','Inter',system-ui,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#f8fafc}

/* Tab Bar */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 0 6px;cursor:pointer;transition:.2s;color:var(--text3);gap:2px;
}
.tab-item.active{color:var(--primary)}
.tab-item svg{width:24px;height:24px}
.tab-item span{font-size:10px;font-weight:500}

/* Page */
.page{display:none;padding:20px 16px 100px}
.page.active{display:block}

/* Home */
.hero{text-align:center;padding:48px 0 32px}
.hero h1{font-size:52px;font-weight:200;letter-spacing:.12em;color:var(--text)}
.hero p{font-size:15px;color:var(--text3);margin-top:8px;letter-spacing:.06em}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.exam-card{
  background:var(--card);border-radius:var(--radius-xl);padding:20px 16px;
  box-shadow:var(--shadow);cursor:pointer;transition:.2s;text-align:center;
  border:1px solid transparent;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.exam-card:active,.exam-card:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:0 4px 16px rgba(99,102,241,.15)}
.exam-card .icon{font-size:32px}
.exam-card .name{font-size:15px;font-weight:600;color:var(--text)}
.exam-card .hint{font-size:12px;color:var(--text3)}
.exam-list{margin-top:12px}
.exam-list .year-group{margin-bottom:4px}
.exam-list .year-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-radius:var(--radius);cursor:pointer;
  background:var(--card);box-shadow:var(--shadow);font-weight:600;font-size:15px;
}
.exam-list .year-header.open{background:var(--primary-light);color:var(--primary)}
.exam-list .month-grid{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 12px 12px}
.exam-list .exam-btn{
  padding:8px 18px;background:var(--card);border-radius:20px;
  border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--text2);
  transition:.2s;
}
.exam-list .exam-btn:active,.exam-list .exam-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.back-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--primary);font-size:14px;margin-bottom:16px}

/* Listening */
.section-card{
  background:var(--card);border-radius:var(--radius-lg);padding:20px;
  margin-bottom:16px;box-shadow:var(--shadow);
}
.section-card .sec-label{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:12px}
.section-card .transcript{
  font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:16px;
  padding:12px;background:var(--bg);border-radius:var(--radius);
  white-space:pre-wrap;max-height:200px;overflow-y:auto;
}
.question-block{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.question-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.question-block .q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}
.option{
  display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;
  border-radius:var(--radius);border:1.5px solid var(--border);cursor:pointer;
  transition:.15s;font-size:14px;
}
.option.selected{border-color:var(--primary);background:var(--primary-light)}
.option.correct{border-color:var(--success);background:var(--success-light)}
.option.wrong{border-color:var(--danger);background:var(--danger-light)}
.option .letter{font-weight:700;font-size:13px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);flex-shrink:0}
.option.selected .letter{background:var(--primary);color:#fff}
.option.correct .letter{background:var(--success);color:#fff}
.option.wrong .letter{background:var(--danger);color:#fff}

.btn-row{display:flex;gap:12px;margin-top:16px}
.btn{
  flex:1;padding:14px;border-radius:var(--radius);text-align:center;
  font-size:15px;font-weight:600;cursor:pointer;border:none;transition:.2s;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-outline{border:1.5px solid var(--border);background:var(--card);color:var(--text2)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--card);border-radius:var(--radius-lg);padding:20px;
  text-align:center;box-shadow:var(--shadow);
}
.stat-num{font-size:36px;font-weight:700;color:var(--text);line-height:1.2}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px}
.section-title{font-size:16px;font-weight:600;margin:20px 0 12px}
.type-cards{display:flex;gap:12px;margin-bottom:20px}
.type-card{
  flex:1;background:var(--card);border-radius:var(--radius-lg);padding:16px;
  box-shadow:var(--shadow);
}
.type-bar{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;margin-top:8px}
.type-fill{height:100%;border-radius:3px;transition:width .5s}
.heatmap{display:flex;gap:4px;overflow-x:auto;padding:12px 0}
.heat-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
.heat-block{width:32px;height:32px;border-radius:6px;background:var(--border-light)}
.heat-block.active{background:#a7f3d0}
.heat-block.today{border:2px solid var(--primary)}
.heat-label{font-size:10px;color:var(--text3);white-space:nowrap}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:8px;box-shadow:var(--shadow);
}

/* Review */
.tab-row{display:flex;gap:12px;margin-bottom:20px}
.tab-btn{flex:1;padding:12px;text-align:center;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;background:var(--card);border:1px solid var(--border)}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-row{display:flex;gap:8px;margin-bottom:16px}
.filter-btn{padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;background:var(--card);border:1px solid var(--border)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.error-card{
  background:var(--card);border-radius:var(--radius-lg);padding:16px;
  margin-bottom:12px;box-shadow:var(--shadow);
}
.error-card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;padding:2px 10px;border-radius:10px}
.tag-listen{background:var(--primary-light);color:var(--primary)}
.tag-trans{background:var(--accent-light);color:var(--accent)}
.vocab-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.add-panel{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.add-panel input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;margin-bottom:10px}
.vocab-card{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.vocab-card .word{font-size:18px;font-weight:700;color:var(--text)}
.vocab-card .def{font-size:14px;color:var(--text2);line-height:1.6;margin-top:4px}
.empty-state{padding:80px 20px;text-align:center;color:var(--text3);font-size:15px}

/* Translation */
.trans-textarea{width:100%;min-height:160px;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius-lg);font-size:14px;line-height:1.7;resize:vertical;font-family:inherit;margin-bottom:16px}
.trans-textarea:focus{outline:none;border-color:var(--primary)}
.score-badge{font-size:48px;font-weight:700;text-align:center;margin:16px 0}
.feedback-box{padding:16px;background:var(--bg);border-radius:var(--radius);font-size:14px;line-height:1.7;color:var(--text2)}
.loading{text-align:center;padding:40px;color:var(--text3)}

/* Audio */
.audio-player{background:var(--card);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.audio-controls{display:flex;align-items:center;gap:12px}
.play-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;border:none}
.progress-bar{flex:1;height:6px;background:var(--border-light);border-radius:3px;position:relative;overflow:visible}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s linear}
.progress-thumb{position:absolute;top:-5px;width:16px;height:16px;border-radius:50%;background:var(--primary);transform:translateX(-50%);box-shadow:0 1px 3px rgba(0,0,0,.2)}

.result-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.result-card{
  background:#fff;border-radius:var(--radius-xl);padding:32px 24px;
  text-align:center;max-width:360px;width:100%;
}
.result-card .big-score{font-size:64px;font-weight:200;color:var(--primary)}
.result-card .result-label{font-size:14px;color:var(--text3);margin:8px 0 24px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="page-home" class="page active"></div>
  <div id="page-stats" class="page"></div>
  <div id="page-review" class="page"></div>
  <div class="tab-bar">
    <div class="tab-item active" data-page="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span>练习</span></div>
    <div class="tab-item" data-page="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="10" width="4" height="10" rx="1"/><rect x="10" y="6" width="4" height="14" rx="1"/><rect x="17" y="2" width="4" height="18" rx="1"/></svg><span>统计</span></div>
    <div class="tab-item" data-page="review"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>复习</span></div>
  </div>
</div>

<script src="app-data.js"></script>
<script>
// ====== App State ======
const $ = (s, p) => (p||document).querySelector(s);
const $$ = (s, p) => [...(p||document).querySelectorAll(s)];
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('cet4_' + k)) } catch { return null } },
  set(k, v) { localStorage.setItem('cet4_' + k, JSON.stringify(v)) },
};

let currentTab = 'home';
let currentView = null; // 'home' | 'listening-list' | 'listening' | 'translation-list' | 'translation'
let currentExam = null;
let audioEl = null;

// ====== Routing ======
function showPage(name) {
  $$('.page').forEach(p => p.classList.remove('active'));
  $('#page-' + name).classList.add('active');
  $$('.tab-item').forEach(t => t.classList.remove('active'));
  $$('.tab-item').forEach(t => { if(t.dataset.page === name) t.classList.add('active'); });
  currentTab = name;
  if(name === 'home') renderHome();
  if(name === 'stats') renderStats();
  if(name === 'review') renderReview();
}

$$('.tab-item').forEach(t => t.addEventListener('click', () => showPage(t.dataset.page)));

// ====== Home ======
function renderHome() {
  currentView = 'home';
  const page = $('#page-home');
  page.innerHTML = `
    <div class="hero">
      <h1>CET—4</h1>
      <p>听力 · 翻译 真题练习</p>
    </div>
    <div class="card-grid">
      <div class="exam-card" id="btn-listening">
        <span class="icon">🎧</span>
        <span class="name">听力练习</span>
        <span class="hint">点击选择真题</span>
      </div>
      <div class="exam-card" id="btn-translation">
        <span class="icon">✏️</span>
        <span class="name">翻译练习</span>
        <span class="hint">AI 智能评分</span>
      </div>
    </div>
    <div id="exam-list-area"></div>
  `;
  $('#btn-listening').addEventListener('click', () => showExamList('listening'));
  $('#btn-translation').addEventListener('click', () => showExamList('translation'));
}

function showExamList(type) {
  currentView = type + '-list';
  const area = $('#exam-list-area');
  const exams = type === 'listening' ? APP_DATA.listeningExams : APP_DATA.translationExams;

  // Group by year
  let years = [...new Set(exams.map(e => e.year))].sort((a,b) => b-a);

  let html = '<div class="exam-list">';
  html += '<div class="back-btn" onclick="renderHome()">← 返回</div>';
  years.forEach(year => {
    html += `<div class="year-group">
      <div class="year-header" data-year="${year}" onclick="toggleYear(this)">${year} 年 <span>⌄</span></div>
      <div class="month-grid hidden">`;
    exams.filter(e => e.year === year).forEach(e => {
      if(type === 'listening') {
        html += `<div class="exam-btn" onclick="startListening(${e.year},${e.month},${e.setNumber})">${e.month}月 卷${e.setNumber}</div>`;
      } else {
        html += `<div class="exam-btn" onclick="startTranslation(${e.year},${e.month})">${e.month}月</div>`;
      }
    });
    html += '</div></div>';
  });
  html += '</div>';
  area.innerHTML = html;

  // Open first year
  setTimeout(() => {
    let first = $('.year-header');
    if(first) first.click();
  }, 50);
}

function toggleYear(el) {
  el.classList.toggle('open');
  let grid = el.nextElementSibling;
  grid.classList.toggle('hidden');
  let arrow = el.querySelector('span');
  arrow.textContent = el.classList.contains('open') ? '⌃' : '⌄';
}

// ====== Listening ======
function startListening(year, month, setNumber) {
  currentView = 'listening';
  currentExam = { year, month, setNumber };
  let sections = APP_DATA.sections.filter(s => s.year === year && s.month === month && s.setNumber === setNumber);
  sections.sort((a,b) => a.audioStart - b.audioStart);

  const page = $('#page-home');
  let secIdx = 0;
  let answers = {};
  let submitted = false;

  function render() {
    let sec = sections[secIdx];
    let allAnswered = sec.questions.every(q => answers[q.id]);
    let isLast = secIdx === sections.length - 1;

    let html = `
      <div class="back-btn" onclick="renderHome()">← 返回列表</div>
      <div class="audio-player">
        <div class="audio-controls">
          <button class="play-btn" id="playBtn">▶</button>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" style="width:0%"></div>
            <div class="progress-thumb" style="left:0%"></div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:8px">${sec.label}</div>
      </div>
      <div class="section-card">
        <div class="sec-label">${sec.label}</div>
        ${renderQuestions(sec.questions, answers, submitted)}
      </div>
      <div class="btn-row">
        ${submitted ? `<button class="btn btn-primary" onclick="nextSec()">${isLast ? '查看成绩' : '下一部分 →'}</button>` :
          `<button class="btn btn-primary" id="submitBtn" ${allAnswered ? '' : 'disabled'} style="${allAnswered ? '' : 'opacity:.5'}">提交答案</button>`}
      </div>
    `;
    page.innerHTML = html;

    // Bind option clicks
    sec.questions.forEach(q => {
      $$('.option').forEach(opt => {
        opt.addEventListener('click', function() {
          if(submitted) return;
          let letter = this.dataset.letter;
          answers[q.id] = letter;
          render();
        });
      });
      // Re-bind after render
      let submitBtn = $('#submitBtn');
      if(submitBtn) submitBtn.addEventListener('click', () => { submitted = true; render(); });
    });
  }

  function nextSec() {
    if(secIdx < sections.length - 1) {
      secIdx++;
      submitted = false;
      render();
    } else {
      // Calculate results
      let correct = 0, total = 0;
      sections.forEach(sec => {
        sec.questions.forEach(q => {
          total++;
          if(answers[q.id] === q.answer) correct++;
        });
      });
      let score = total > 0 ? Math.round((correct / total) * 100) : 0;
      // Save session
      let sessions = LS.get('sessions') || [];
      sessions.push({ type: 'listening', year, month, setNumber, score, total, timestamp: Date.now() });
      LS.set('sessions', sessions);
      showResult(score, correct, total);
    }
  }

  render();
}

function renderQuestions(questions, answers, submitted) {
  return questions.map((q, i) => `
    <div class="question-block">
      <div class="q-text">${i+1}. ${q.question}</div>
      ${['A','B','C','D'].map(l => {
        let cls = 'option';
        if(answers[q.id] === l) cls += ' selected';
        if(submitted) {
          if(l === q.answer) cls += ' correct';
          else if(answers[q.id] === l) cls += ' wrong';
        }
        return `<div class="${cls}" data-letter="${l}"><span class="letter">${l}</span>${(q.options['ABCD'.indexOf(l)] || '')}</div>`;
      }).join('')}
    </div>
  `).join('');
}

function showResult(score, correct, total) {
  const page = $('#page-home');
  page.innerHTML = `
    <div class="result-overlay" style="position:static;background:none;z-index:auto;padding:40px 0">
      <div class="result-card" style="margin:0 auto">
        <div class="big-score">${score}</div>
        <div class="result-label">正确 ${correct}/${total} 题</div>
        <button class="btn btn-primary" style="width:100%" onclick="renderHome()">返回首页</button>
      </div>
    </div>
  `;
}

// ====== Translation ======
function startTranslation(year, month) {
  currentView = 'translation';
  currentExam = { year, month };
  let questions = APP_DATA.questions.filter(q => q.type === 'translation' && q.year === year && q.month === month);
  let index = 0;
  let score = 0;

  function render() {
    let q = questions[index];
    let page = $('#page-home');
    page.innerHTML = `
      <div class="back-btn" onclick="renderHome()">← 返回列表</div>
      <div class="section-card">
        <div class="sec-label">${q.section || ''} · ${year}年${month}月</div>
        <div style="font-weight:500;margin-bottom:12px">📝 中文原文：</div>
        <div class="transcript">${q.chineseText}</div>
        <textarea class="trans-textarea" id="transInput" placeholder="请输入你的英文翻译..."></textarea>
        <button class="btn btn-primary" style="width:100%" id="transSubmit">提交评分</button>
        <div id="transResult" class="hidden"></div>
      </div>
    `;
    $('#transSubmit').addEventListener('click', async () => {
      let input = $('#transInput').value.trim();
      if(!input) return;
      $('#transSubmit').textContent = 'AI 评分中...';
      $('#transSubmit').disabled = true;

      // Simple local scoring
      let ref = q.referenceAnswer.toLowerCase().replace(/[^a-z]/g,' ');
      let user = input.toLowerCase().replace(/[^a-z]/g,' ');
      let refWords = new Set(ref.split(/\s+/).filter(w => w.length > 2));
      let userWords = new Set(user.split(/\s+/).filter(w => w.length > 2));
      let match = [...refWords].filter(w => userWords.has(w)).length;
      let s = refWords.size > 0 ? Math.min(95, Math.round((match / refWords.size) * 60 + 40)) : 60;

      let feedback = `参考译文：${q.referenceAnswer.slice(0,200)}...`;
      if(s >= 80) feedback = '✅ 翻译质量很好！\n' + feedback;
      else if(s >= 60) feedback = '⚠️ 基本达意，但还有提升空间。\n' + feedback;
      else feedback = '❌ 需要加强练习。\n' + feedback;

      let el = $('#transResult');
      el.classList.remove('hidden');
      el.innerHTML = `
        <div class="score-badge">${s}</div>
        <div class="feedback-box">${feedback.replace(/\n/g,'<br>')}</div>
        <button class="btn ${index < questions.length - 1 ? 'btn-primary' : 'btn-success'}" style="width:100%;margin-top:12px" id="transNext">
          ${index < questions.length - 1 ? '下一题 →' : '完成'}
        </button>
      `;
      score += s;

      // Save
      let sessions = LS.get('sessions') || [];
      sessions.push({ type: 'translation', year, month, score: s, total: 100, timestamp: Date.now() });
      LS.set('sessions', sessions);

      $('#transNext').addEventListener('click', () => {
        if(index < questions.length - 1) {
          index++;
          render();
        } else {
          let avg = Math.round(score / questions.length);
          let page = $('#page-home');
          page.innerHTML = `
            <div class="result-overlay" style="position:static;background:none;z-index:auto;padding:40px 0">
              <div class="result-card" style="margin:0 auto">
                <div class="big-score">${avg}</div>
                <div class="result-label">平均得分 · ${questions.length} 题</div>
                <button class="btn btn-primary" style="width:100%" onclick="renderHome()">返回首页</button>
              </div>
            </div>
          `;
        }
      });
    });
  }

  render();
}

// ====== Stats ======
function renderStats() {
  let sessions = LS.get('sessions') || [];
  let page = $('#page-stats');

  let totalPractices = sessions.length;
  let totalScore = sessions.reduce((s,r) => s + r.score, 0);
  let totalQuestions = sessions.reduce((s,r) => s + (r.total || 0), 0);
  let overallAccuracy = totalQuestions > 0 ? Math.round((totalScore / totalQuestions) * 100) : 0;

  // Streak
  let dateSet = new Set();
  sessions.forEach(s => {
    let d = new Date(s.timestamp);
    dateSet.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  });
  let streak = 0;
  let today = new Date();
  for(let i=0; i<365; i++) {
    let d = new Date(today);
    d.setDate(d.getDate() - i);
    let key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(dateSet.has(key)) streak++;
    else break;
  }

  let listenSessions = sessions.filter(s => s.type === 'listening');
  let transSessions = sessions.filter(s => s.type === 'translation');
  let listScore = listenSessions.reduce((s,r) => s + r.score, 0);
  let listTotal = listenSessions.reduce((s,r) => s + (r.total || 0), 0);
  let transScore = transSessions.reduce((s,r) => s + r.score, 0);
  let listAcc = listTotal > 0 ? Math.round((listScore / listTotal) * 100) : 0;
  let transAvg = transSessions.length > 0 ? Math.round(transScore / transSessions.length) : 0;

  // 14-day heatmap
  let heatmapHTML = '';
  for(let i=13; i>=0; i--) {
    let d = new Date(today);
    d.setDate(d.getDate() - i);
    let key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    let isToday = i === 0;
    heatmapHTML += `<div class="heat-cell"><div class="heat-block ${dateSet.has(key) ? 'active' : ''} ${isToday ? 'today' : ''}"></div><span class="heat-label">${d.getMonth()+1}/${d.getDate()}</span></div>`;
  }

  let recentHTML = sessions.slice(0,10).map(s => {
    let d = new Date(s.timestamp);
    let time = d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    let acc = (s.total||0) > 0 ? Math.round((s.score/(s.total||1))*100) : s.score;
    return `<div class="history-item">
      <div><span style="font-size:14px;font-weight:500">${s.type==='listening'?'🎧':'✏️'} ${s.year}.${String(s.month).padStart(2,'0')}${s.setNumber?' 卷'+s.setNumber:''}</span><br><span style="font-size:11px;color:var(--text3)">${time}</span></div>
      <div style="text-align:right"><span style="font-size:14px;font-weight:600">${s.score}/${s.total||100}</span><br><span style="font-size:12px;color:${acc>=60?'var(--success)':'var(--danger)'}">${acc}%</span></div>
    </div>`;
  }).join('');

  page.innerHTML = `
    <div style="padding-top:12px">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${totalPractices}</div><div class="stat-label">练习次数</div></div>
      <div class="stat-card"><div class="stat-num">${overallAccuracy}%</div><div class="stat-label">总正确率</div></div>
      <div class="stat-card"><div class="stat-num">${streak}天</div><div class="stat-label">连续打卡</div></div>
      <div class="stat-card"><div class="stat-num">${listenSessions.length + transSessions.length}</div><div class="stat-label">完成套卷</div></div>
    </div>
    <div class="section-title">题型统计</div>
    <div class="type-cards">
      <div class="type-card">
        <div style="font-size:14px;font-weight:500">🎧 听力</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${listenSessions.length}次 · ${listAcc}%</div>
        <div class="type-bar"><div class="type-fill" style="width:${listAcc}%;background:var(--primary)"></div></div>
      </div>
      <div class="type-card">
        <div style="font-size:14px;font-weight:500">✏️ 翻译</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${transSessions.length}次 · 均${transAvg}分</div>
        <div class="type-bar"><div class="type-fill" style="width:${transAvg}%;background:var(--success)"></div></div>
      </div>
    </div>
    <div class="section-title">打卡日历</div>
    <div class="heatmap">${heatmapHTML}</div>
    <div class="section-title">近期记录</div>
    ${recentHTML || '<div class="empty-state">暂无练习记录</div>'}
    </div>
  `;
}

// ====== Review ======
function renderReview() {
  let page = $('#page-review');
  let activeTab = 'errors';
  let filterType = 'all';

  // Load data
  let errors = LS.get('errors') || [];
  let vocab = LS.get('vocab') || [];

  function render() {
    let html = `
      <div class="tab-row">
        <div class="tab-btn ${activeTab==='errors'?'active':''}" id="tab-errors">📋 错题本</div>
        <div class="tab-btn ${activeTab==='vocab'?'active':''}" id="tab-vocab">📖 生词本</div>
      </div>
    `;

    if(activeTab === 'errors') {
      let filtered = errors.filter(e => !e.resolved);
      if(filterType !== 'all') filtered = filtered.filter(e => e.questionId.startsWith(filterType === 'translation' ? 'T-' : ''));
      filtered.sort((a,b) => b.timestamp - a.timestamp);

      html += `
        <div class="filter-row">
          <div class="filter-btn ${filterType==='all'?'active':''}" data-filter="all">全部</div>
          <div class="filter-btn ${filterType==='listening'?'active':''}" data-filter="listening">听力</div>
          <div class="filter-btn ${filterType==='translation'?'active':''}" data-filter="translation">翻译</div>
        </div>
        ${filtered.length === 0 ? '<div class="empty-state">暂无错题 🎉</div>' :
          filtered.map(e => {
            let ctx = parseQuestionId(e.questionId);
            return `<div class="error-card">
              <div class="meta">
                <span class="tag ${ctx.type==='translation'?'tag-trans':'tag-listen'}">${ctx.type==='translation'?'翻译':'听力'}</span>
                ${ctx.type === 'listening' ? `<span style="font-size:12px;color:var(--text3)">${ctx.year}年${ctx.month}月 卷${ctx.setNumber}</span>` : `<span style="font-size:12px;color:var(--text3)">${ctx.year}年${ctx.month}月</span>`}
              </div>
              <div style="font-size:13px;color:var(--text2);margin-bottom:8px">答案：<span style="color:var(--danger);text-decoration:line-through">${e.userAnswer}</span></div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-outline" style="flex:1;padding:8px" onclick="retryError('${e.questionId}')">重新练习</button>
                <button class="btn btn-success" style="flex:1;padding:8px" onclick="resolveError(${e.id})">已掌握</button>
              </div>
            </div>`;
          }).join('')
        }
      `;
    } else {
      html += `
        <div class="vocab-header">
          <span style="color:var(--text3)">${vocab.length} 个生词</span>
          <button class="btn btn-primary" style="padding:8px 20px;font-size:13px" id="btn-add-vocab">+ 添加</button>
        </div>
        <div id="add-panel" class="hidden add-panel">
          <input type="text" id="vocab-input" placeholder="输入英语单词" />
          <button class="btn btn-primary" style="width:100%;padding:12px" id="btn-confirm-vocab">添加</button>
        </div>
        ${vocab.length === 0 ? '<div class="empty-state">暂无生词，开始学习吧 📖</div>' :
          vocab.sort((a,b) => b.timestamp - a.timestamp).map(w => `
            <div class="vocab-card">
              <div style="display:flex;justify-content:space-between">
                <div class="word">${w.word}</div>
                <button class="btn btn-outline" style="padding:4px 12px;font-size:11px" onclick="deleteVocab(${w.id})">删除</button>
              </div>
              <div class="def">${w.translation || ''}</div>
            </div>
          `).join('')
        }
      `;
    }

    page.innerHTML = html;

    // Bind events
    $('#tab-errors')?.addEventListener('click', () => { activeTab='errors'; render(); });
    $('#tab-vocab')?.addEventListener('click', () => { activeTab='vocab'; render(); });
    $$('.filter-btn').forEach(b => b.addEventListener('click', function() { filterType = this.dataset.filter; render(); }));
    $('#btn-add-vocab')?.addEventListener('click', () => { $('#add-panel').classList.toggle('hidden'); });
    $('#btn-confirm-vocab')?.addEventListener('click', async () => {
      let word = $('#vocab-input').value.trim();
      if(!word) return;
      // Simple definition lookup
      let def = '"' + word + '" 的释义（请查词典确认）';
      vocab.push({ id: Date.now(), word, translation: def, timestamp: Date.now() });
      LS.set('vocab', vocab);
      render();
    });
  }

  render();
}

function parseQuestionId(id) {
  if(id.startsWith('T-')) {
    let m = id.match(/^T-(\d{4})-(\d{2})/);
    if(m) return { type: 'translation', year: Number(m[1]), month: Number(m[2]) };
    return { type: 'translation', year: 0, month: 0 };
  }
  let m = id.match(/^(\d{4})-(\d{2})-S([12])-Q/);
  if(m) return { type: 'listening', year: Number(m[1]), month: Number(m[2]), setNumber: Number(m[3]) };
  return { type: 'listening', year: 0, month: 0 };
}

window.resolveError = function(id) {
  let errors = LS.get('errors') || [];
  let e = errors.find(x => x.id === id);
  if(e) e.resolved = true;
  LS.set('errors', errors);
  renderReview();
};

window.deleteVocab = function(id) {
  let vocab = LS.get('vocab') || [];
  vocab = vocab.filter(w => w.id !== id);
  LS.set('vocab', vocab);
  renderReview();
};

window.retryError = function(qId) {
  let ctx = parseQuestionId(qId);
  if(ctx.type === 'listening') {
    showPage('home');
    setTimeout(() => startListening(ctx.year, ctx.month, ctx.setNumber || 1), 50);
  } else {
    showPage('home');
    setTimeout(() => startTranslation(ctx.year, ctx.month), 50);
  }
};

// Load data and init
let APP_DATA = null;
fetch('./app-data.json')
  .then(r => r.json())
  .then(d => { APP_DATA = d; renderHome(); })
  .catch(e => { document.body.innerHTML = '<div class="loading">数据加载失败，请刷新页面</div>'; console.error(e); });
</script>
</body>
</html>
